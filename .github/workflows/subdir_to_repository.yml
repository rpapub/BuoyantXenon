name: Subdir to Repository

on:
  workflow_dispatch:
  schedule:
    - cron: "59 4 * * *" #daily (UTC)

jobs:
  perform-subdir-to-repository:
    runs-on: ubuntu-latest

    steps:
      - name: Install git-filter-repo
        run: |
            pip install --user git-filter-repo==2.47.0
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Checkout Repository
        uses: actions/checkout@v4
        env:
          GITHUB_TOKEN: ${{ secrets.RPAPUB_REF_CONTENTS_RW_PAT }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Runner"
          git config --global user.email "actions@github.com"
      

      - name: Run Subdir to Repository Script
        env:
          GITHUB_TOKEN: ${{ secrets.RPAPUB_REF_CONTENTS_RW_PAT }}
        run: |
          chmod +x subdir_to_repository.sh
          ./subdir_to_repository.sh

